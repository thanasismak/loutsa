<app-hero
  variant="split"
  [backgroundImage]="heroImage()"
  titleKey="home.hero"
  subtitleKey="home.hero_subtitle"
  eyebrow="Camping Loutsa · Φινικούντα, Μεσσηνία"
  [usps]="heroUsps"
  primaryCtaKey="home.cta"
  primaryCtaLink="/pricing"
  secondaryCtaKey="app.nav.contact"
  secondaryCtaLink="/contact">
</app-hero>

<!-- Navigation Cards Section -->
<app-section [title]="'home.explore' | translate">
  <app-tiles [gridClass]="'cols-3'">
    @for (card of navigationCards; track $index; let i = $index) {
      <app-card [config]="card" [style.animation-delay]="(i * 100) + 'ms'"></app-card>
    }
  </app-tiles>
</app-section>

<!-- Featured — atmospheric photo + 3 nearby highlights -->
<app-featured
  [content]="featuredContent()"
  [scrollPosition]="scrollPosition()">
</app-featured>

<!-- Combined Reviews + Testimonials Section -->
<app-section [sectionClass]="'highlight testimonials-compact'">

  <!-- Title + 4.6 rating bar on same row -->
  <div class="rt-section-header">
    <h2 class="rt-title">{{ 'home.testimonials' | translate }}</h2>
    <div class="rt-rating-bar">
      <span class="rt-score">{{ avgRating }}</span>
      <div class="rt-stars">
        @for (filled of ratingStars; track $index) {
          <svg class="rt-star" [class.rt-star--filled]="filled" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77 5.82 21.02 7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        }
      </div>
      <span class="rt-google-label">Google Reviews</span>
    </div>
  </div>

  <!-- Testimonials Carousel -->
  <app-carousel [items]="testimonials()" [autoRotate]="!showAllReviews()" [rotationInterval]="5000"
    [visibleCount]="showAllReviews() ? testimonials().length : 3"
    [showIndicators]="false" [showNavigation]="false">
  </app-carousel>

  <!-- Show more / less toggle -->
  <div class="rt-toggle">
    <button class="rt-toggle-btn" (click)="toggleReviews()">
      @if (!showAllReviews()) {
        {{ 'home.show_all_reviews' | translate: { count: testimonials().length } }}
      } @else {
        {{ 'home.show_fewer_reviews' | translate }}
      }
    </button>
  </div>

  <!-- Write a Google Review CTA -->
  <div class="rt-cta">
    <a [href]="reviewLink" target="_blank" rel="noopener noreferrer" class="rt-cta-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
        <path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/>
      </svg>
      {{ 'home.write_review' | translate }}
    </a>
  </div>

</app-section>
