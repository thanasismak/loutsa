<!-- Hero Section using HeroComponent -->
<app-hero
  titleKey="home.hero"
  subtitleKey="home.hero_subtitle"
  [backgroundImage]="heroImage()"
  [mobileImage]="heroImageMobile()">
</app-hero>

<!-- Featured Section using FeaturedComponent -->
<app-section [sectionClass]="'featured'">
  <app-featured 
    [content]="featuredContent()" 
    [variant]="'grid-animated'"
    [scrollPosition]="scrollPosition()">
  </app-featured>
</app-section>

<!-- Navigation Cards Section -->
<app-section [title]="'home.explore' | translate">
  <app-tiles [gridClass]="'cols-3'">
    @for (card of navigationCards; track $index; let i = $index) {
      <app-card [config]="card" [style.animation-delay]="(i * 100) + 'ms'"></app-card>
    }
  </app-tiles>
</app-section>

<!-- Google Reviews Section -->
<app-section [title]="'home.reviews' | translate" [sectionClass]="'reviews-section'">
  <app-reviews></app-reviews>
</app-section>

<!-- Highlights Section - Testimonials (3 per view, auto-rotate) -->
<app-section [title]="'home.testimonials' | translate" [sectionClass]="'highlight testimonials-compact'">
  <app-carousel 
    [items]="testimonials()"
    [autoRotate]="true"
    [rotationInterval]="5000"
    [visibleCount]="3"
    [showIndicators]="false"
    [showNavigation]="false">
  </app-carousel>
</app-section>
