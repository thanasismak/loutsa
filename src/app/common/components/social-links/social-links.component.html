<ul class="social-links" [class]="'social-links--' + variant()" role="list" aria-label="Social media links">
  @for (link of links(); track link.id) {
    <li class="social-links__item">
      <a
        [href]="link.url"
        target="_blank"
        rel="noopener noreferrer"
        class="social-links__anchor"
        [class]="'social-links__anchor--' + link.id"
        [attr.aria-label]="link.ariaLabel">

        <!-- Inline SVG icons — no external dependency -->
        @switch (link.id) {
          @case ('facebook') {
            <svg class="social-links__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.791-4.697 4.533-4.697 1.313 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.883v2.254h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
          }
          @case ('instagram') {
            <svg class="social-links__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
            </svg>
          }
          @case ('tripadvisor') {
            <svg class="social-links__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm-1.232 16.826L8.56 15.049l-1.665 1.778L5.19 15.12l1.66-1.77-1.66-1.771 1.704-1.707 1.666 1.778 2.208-1.777 1.208 3.153a4.46 4.46 0 0 0 1.024.12c.364 0 .718-.044 1.058-.123l1.208-3.15 2.209 1.777 1.665-1.778 1.705 1.707-1.66 1.771 1.66 1.77-1.705 1.707-1.665-1.778-2.075 1.695a4.477 4.477 0 0 1-2.4.7 4.47 4.47 0 0 1-2.204-.577zM12 7.5A4.5 4.5 0 1 1 7.5 12 4.505 4.505 0 0 1 12 7.5zm0 1.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
            </svg>
          }
          @case ('google') {
            <svg class="social-links__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/>
            </svg>
          }
        }

        @if (variant() === 'labeled') {
          <span class="social-links__label">{{ link.label }}</span>
        }
      </a>
    </li>
  }
</ul>
