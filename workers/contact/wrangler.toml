name = "loutsa-contact"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Route: handles POST https://api.loutsacamping.gr/contact
routes = [
  { pattern = "api.loutsacamping.gr/contact", zone_name = "loutsacamping.gr" }
]

# KV namespace for rate limiting
# After creating the namespace (`wrangler kv namespace create RATE_LIMIT_KV`),
# replace the id below with the real one from the output.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b65eacfb555249e4a06b571c812da3e6"

# Environment secrets (never stored here — add via `wrangler secret put`):
#   wrangler secret put RESEND_API_KEY
